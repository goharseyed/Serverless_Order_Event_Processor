name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  node-tests:
    name: Node.js Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: node-lambda
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install dependencies
        run: npm install
      - name: Run Jest tests
        run: npm test

  java-tests:
    name: Java Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: java-lambda
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
      - name: Build and run JUnit tests
        run: mvn test
